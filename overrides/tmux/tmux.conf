# Personal overrides on top of hendrikmi tmux.conf
# Strategy: source upstream first, then override at the end so changes win.

source-file ~/third-party/hendrikmi-dotfiles/tmux/tmux.conf

# --- Extended keys (CSI-u) ---------------------------------------------------
# Ghostty가 Shift+Enter를 CSI-u로 인코딩해서 보내려면 tmux에서 extended-keys 켜야 함.
set -g extended-keys on
set -g extended-keys-format csi-u
set -g xterm-keys on

# --- vim-tmux-navigator pattern (codex 제외) ---------------------------------
# codex 안에서도 Ctrl+H/J/K/L을 tmux pane 이동으로 사용하기 위해 codex를 패턴에서 제거.
# upstream은 codex를 포함하고 있어 nav 키가 codex로 전달됨 → 여기서 덮어씀.
set -g @vim_navigator_pattern '(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'

# --- Shift+Enter → 줄바꿈 (codex 안에서만) -----------------------------------
# Ghostty가 Shift+Enter를 CSI-u S-Enter로 보냄. codex에서는 C-j(LF)로 번역,
# 그 외 pane에서는 그대로 통과시켜 일반 동작 유지.
bind-key -n S-Enter if-shell -F '#{==:#{pane_current_command},codex}' 'send-keys C-j' 'send-keys S-Enter'

# --- Tokyo Night blue active pane border (Phase 14) --------------------------
# Original: green_soft #A3BE8C — comment the line below to revert.
set -g pane-active-border-style "fg=#7aa2f7"
